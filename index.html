<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cafeteria System</title>

  <style>
    body{
      font-family: Arial;
      background:#f0f2f5;
      text-align:center;
    }

    .card{
      background:white;
      padding:20px;
      margin:20px auto;
      width:320px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input, select{
      width:90%;
      padding:8px;
      margin:5px;
    }

    button{
      width:95%;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    img{
      width:80px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginDiv">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div class="card" id="cashierDiv" style="display:none;">
  <img id="photo">
  <h3 id="name"></h3>

  <select id="products"></select>
  <input id="qty" type="number" placeholder="Qty">

  <button onclick="sell()">Sell</button>
</div>

<!-- ADMIN -->
<div class="card" id="adminDiv" style="display:none;">
  <h3>Admin Panel</h3>

  <input id="pname" placeholder="Product Name">
  <input id="ppurchase" placeholder="Purchase Price">
  <input id="psale" placeholder="Sale Price">
  <input id="pstock" placeholder="Stock">

  <button onclick="addProduct()">Add Product</button>
</div>

<script>

// 🔥 حط هنا لينك Apps Script API
const API = "https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

let currentUser = {};

function login(){

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"login",
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    if(res.status=="success"){

      currentUser = res;

      document.getElementById("loginDiv").style.display="none";

      document.getElementById("name").innerText = res.name;
      document.getElementById("photo").src = res.photo || "https://i.pravatar.cc/100";

      if(res.role=="admin"){
        document.getElementById("adminDiv").style.display="block";
      } else {
        document.getElementById("cashierDiv").style.display="block";
        loadProducts();
      }

    } else {
      alert("Wrong login ❌");
    }

  });

}

function loadProducts(){

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"getProducts",
      branch: currentUser.branch
    })
  })
  .then(r=>r.json())
  .then(data=>{

    let select = document.getElementById("products");
    select.innerHTML="";

    data.forEach(p=>{
      let opt = document.createElement("option");
      opt.value = p.id;
      opt.text = p.name + " - " + p.price;
      select.appendChild(opt);
    });

  });

}

function sell(){

  let select = document.getElementById("products");

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"addSale",
      username: currentUser.name,
      branch: currentUser.branch,
      productID: select.value,
      qty: document.getElementById("qty").value,
      price: select.options[select.selectedIndex].text.split("-")[1]
    })
  });

  alert("Sale Done ✅");

}

function addProduct(){

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"addProduct",
      name: document.getElementById("pname").value,
      purchase: document.getElementById("ppurchase").value,
      sale: document.getElementById("psale").value,
      stock: document.getElementById("pstock").value,
      branch: currentUser.branch
    })
  });

  alert("Product Added ✅");

}

</script>

</body>
</html>
