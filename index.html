<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cafeteria POS</title>

<style>
body{font-family:Arial;background:#2f528f;text-align:center;color:#333}

.card{
  background:#fff;
  width:380px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:92%;
  padding:10px;
  margin:6px;
}

button{
  width:95%;
  padding:10px;
  margin:5px;
  background:#345a9d;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#274a86;}

.logout{background:#777;}

img{width:90px;border-radius:50%}

hr{margin:15px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginDiv">
  <img src="https://amrattiaewais69-gif.github.io/Cafeteria-System/photos/logo.png" height="70">
  <h2>University of East Capital</h2>
  <h2>Cafeteria POS System</h2>
  <h2>Cashier Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div class="card" id="cashierDiv" style="display:none;">

  <img id="photo">
  <h3 id="name"></h3>
  <p id="cashierName"></p>

  <select id="products" onchange="setPrice()"></select>

  <p>Stock: <span id="stock">0</span></p>

  <input id="qty" type="number" placeholder="Qty">

  <p>Price: <span id="price">0</span></p>

  <input id="paid" type="number" placeholder="Paid" oninput="updateBill()">

  <p>Total: <span id="total">0</span></p>
  <p>Change: <span id="change">0</span></p>

  <hr>

  <!-- CART -->
  <h4>🧾 Bill Items</h4>

  <div id="cartBox" style="text-align:left;background:#f7f7f7;padding:10px;border-radius:8px;max-height:180px;overflow:auto;"></div>

  <b>Total Bill: <span id="billTotal">0</span></b>

  <hr>

  <button onclick="addToCart()">Add</button>
  <button onclick="checkout()">Checkout</button>
  <button onclick="newSale()">New Sale</button>
  <button class="logout" onclick="logout()">Logout</button>

</div>

<!-- ADMIN -->
<div class="card" id="adminDiv" style="display:none;">

  <h3>Admin Panel</h3>

  <input id="pname" placeholder="Product Name">
  <input id="ppurchase" placeholder="Purchase Price">
  <input id="psale" placeholder="Sale Price">
  <input id="pstock" placeholder="Stock">
  <input id="pbranch" placeholder="Branch">
  <input id="pmin" placeholder="Min Stock">

  <button onclick="addProduct()">➕ Add Product</button>

  <hr>

  <select id="stockProduct"></select>
  <input id="addQty" type="number" placeholder="Add Stock">
  <button onclick="increaseStock()">➕ Add Stock</button>

  <hr>

  <select id="deleteProductList"></select>
  <button onclick="deleteProduct()">❌ Delete Product</button>

  <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

let currentUser={};
let cart=[];

// ================= LOGIN =================
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success"){
currentUser=res;

loginDiv.style.display="none";

name.innerText=res.name;
cashierName.innerText="Cashier: "+res.name;
photo.src=res.photo || "https://i.pravatar.cc/100";

if(res.role=="admin"){
adminDiv.style.display="block";
loadAdmin();
}else{
cashierDiv.style.display="block";
loadProducts();
}

}else{
alert("Login Failed");
}

});

}

// ================= PRODUCTS =================
function loadProducts(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getProducts",
role:currentUser.role,
branch:currentUser.branch
})
})
.then(r=>r.json())
.then(data=>{

products.innerHTML="";

data.forEach(p=>{

let opt=document.createElement("option");
opt.value=p.id;
opt.text=`${p.name} - ${p.price} (Stock:${p.stock})`;
opt.setAttribute("data-price",p.price);
opt.setAttribute("data-stock",p.stock);

products.appendChild(opt);

});

setPrice();

});

}

function setPrice(){

let s=products.options[products.selectedIndex];

price.innerText=s.getAttribute("data-price");
stock.innerText=s.getAttribute("data-stock");

}

// ================= CART =================
function addToCart(){

let p=parseFloat(price.innerText);
let q=parseInt(qty.value);

if(!q || q<=0){
alert("Invalid qty");
return;
}

cart.push({
id:products.value,
name:products.options[products.selectedIndex].text,
qty:q,
price:p,
total:q*p
});

renderCart();
updateBill();

}

// ================= RENDER CART + REMOVE =================
function renderCart(){

cartBox.innerHTML="";
let t=0;

cart.forEach((i,index)=>{
t+=i.total;

cartBox.innerHTML+=`
<div style="display:flex;justify-content:space-between;align-items:center;padding:5px;border-bottom:1px solid #ddd">

<div>
<b>${i.name}</b><br>
<small>Qty: ${i.qty} | Total: ${i.total}</small>
</div>

<button onclick="removeItem(${index})" style="background:red;width:40px;height:30px">X</button>

</div>
`;
});

billTotal.innerText=t;

updateBill();

}

// ================= REMOVE ITEM (RETURN STOCK READY) =================
function removeItem(index){

if(!confirm("Remove item?")) return;

// optional stock return (backend)
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"returnStock",
productID:cart[index].id,
qty:cart[index].qty
})
});

cart.splice(index,1);
renderCart();

}

// ================= BILL =================
function updateBill(){

let total=cart.reduce((a,b)=>a+b.total,0);

document.getElementById("total").innerText=total;

let paidVal=parseFloat(paid.value||0);

document.getElementById("change").innerText=paidVal-total;

}

// ================= CHECKOUT =================
function checkout(){

if(cart.length==0){
alert("Cart empty");
return;
}

let req=cart.map(i=>{

return fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addSale",
username:currentUser.name,
branch:currentUser.branch,
productID:i.id,
qty:i.qty,
price:i.price
})
}).then(r=>r.json());

});

Promise.all(req).then(res=>{

for(let r of res){
if(r.status=="error"){
alert(r.message);
return;
}
}

alert("Sale Done ✅");

cart=[];
renderCart();

paid.value="";
change.innerText=0;

loadProducts();

});

}

// ================= NEW SALE =================
function newSale(){
cart=[];
renderCart();
paid.value="";
change.innerText=0;
}

// ================= ADMIN =================
function loadAdmin(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getProducts",
role:"admin"
})
})
.then(r=>r.json())
.then(data=>{

stockProduct.innerHTML="";
deleteProductList.innerHTML="";

data.forEach(p=>{

let text=`${p.name} (Stock:${p.stock}) - ${p.branch}`;

let o1=document.createElement("option");
o1.value=p.id;
o1.text=text;

stockProduct.appendChild(o1);
deleteProductList.appendChild(o1.cloneNode(true));

});

});

}

function addProduct(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addProduct",
name:pname.value,
purchase:ppurchase.value,
sale:psale.value,
stock:pstock.value,
branch:pbranch.value,
minStock:pmin.value,
username:currentUser.name
})
});

alert("Product Added");
}

function increaseStock(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addStock",
productID:stockProduct.value,
qty:addQty.value,
username:currentUser.name,
branch:currentUser.branch
})
});

alert("Stock Updated");
}

function deleteProduct(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"deleteProduct",
productID:deleteProductList.value,
username:currentUser.name,
branch:currentUser.branch
})
});

alert("Deleted");
}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
