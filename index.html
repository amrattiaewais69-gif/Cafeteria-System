<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cafeteria POS</title>

<style>
body{font-family:Arial;background:#2f528f;text-align:center;color:#333}

.card{
  background:#fff;
  width:360px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:90%;
  padding:10px;
  margin:6px;
}

button{
  width:95%;
  padding:10px;
  margin:5px;
  background:#345a9d;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#274a86;}

.logout{background:#777;}

img{width:90px;border-radius:50%}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginDiv">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div class="card" id="cashierDiv" style="display:none;">
  <img id="photo">
  <h3 id="name"></h3>
  <p id="cashierName"></p>

  <select id="products" onchange="setPrice()"></select>

  <p>Stock: <span id="stock">0</span></p>

  <input id="qty" type="number" placeholder="Qty">

  <p>Price: <span id="price">0</span></p>
  <p>Total: <span id="total">0</span></p>

  <input id="paid" type="number" placeholder="Paid" oninput="updateTotal()">
  <p>Change: <span id="change">0</span></p>

  <button onclick="addToCart()">Add</button>
  <button onclick="checkout()">Checkout</button>
  <button onclick="newSale()">New Sale</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div class="card" id="adminDiv" style="display:none;">
  <h3>Admin Panel</h3>

  <input id="pname" placeholder="Product Name">
  <input id="ppurchase" placeholder="Purchase Price">
  <input id="psale" placeholder="Sale Price">
  <input id="pstock" placeholder="Stock">
  <input id="pbranch" placeholder="Branch">
  <input id="pmin" placeholder="Min Stock">

  <button onclick="addProduct()">➕ Add Product</button>
  <button onclick="clearForm()">🧹 Clear</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

let currentUser = {};
let cart = [];

// ================= LOGIN =================
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success"){
currentUser=res;
localStorage.setItem("user",JSON.stringify(res));
loginSuccess();
}else{
alert("Wrong login");
}

});

}

function loginSuccess(){

loginDiv.style.display="none";

name.innerText=currentUser.name;
cashierName.innerText="Cashier: "+currentUser.name;
photo.src=currentUser.photo||"https://i.pravatar.cc/100";

if(currentUser.role=="admin"){
adminDiv.style.display="block";
}else{
cashierDiv.style.display="block";
loadProducts();
}

}

// ================= PRODUCTS =================
function loadProducts(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getProducts",
branch:currentUser.branch
})
})
.then(r=>r.json())
.then(data=>{

products.innerHTML="";

data.forEach(p=>{

let opt=document.createElement("option");

let warning = "";
if(p.stock <= p.minStock){
warning = " ⚠️";
}

opt.value=p.id;
opt.text=`${p.name} - ${p.price} (Stock: ${p.stock})${warning}`;
opt.setAttribute("data-stock",p.stock);
opt.setAttribute("data-price",p.price);

products.appendChild(opt);

});

setPrice();

});

}

function setPrice(){

let selected=products.options[products.selectedIndex];

let price=selected.getAttribute("data-price");
let stockVal=selected.getAttribute("data-stock");

document.getElementById("price").innerText=price;
document.getElementById("stock").innerText=stockVal;

}

// ================= CART =================
function addToCart(){

let price=parseFloat(document.getElementById("price").innerText);
let qty=parseInt(document.getElementById("qty").value);
let stockVal=parseInt(document.getElementById("stock").innerText);

if(!qty || qty <= 0){
alert("Enter valid quantity");
return;
}

if(qty > stockVal){
alert("Not enough stock ❌");
return;
}

cart.push({
productID:products.value,
qty,
price,
total:qty*price
});

updateTotal();

}

function updateTotal(){

let total=cart.reduce((a,b)=>a+b.total,0);
document.getElementById("total").innerText=total;

let paid=parseFloat(document.getElementById("paid").value||0);
document.getElementById("change").innerText=paid-total;

}

// ================= CHECKOUT =================
function checkout(){

if(cart.length==0){
alert("Cart is empty");
return;
}

let promises = cart.map(item => {
return fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addSale",
username:currentUser.name,
branch:currentUser.branch,
productID:item.productID,
qty:item.qty,
price:item.price
})
})
.then(r=>r.json());
});

Promise.all(promises).then(results=>{

let hasLowStock = false;

for(let res of results){

if(res.status=="error"){
alert(res.message);
return;
}

if(res.status=="low_stock"){
hasLowStock = true;
}

}

alert("Sale Done ✅");

if(hasLowStock){
alert("⚠️ في منتجات قربت تخلص من الاستوك");
}

loadProducts();
newSale();

});

}

// ================= NEW SALE =================
function newSale(){

cart=[];
document.getElementById("total").innerText=0;
document.getElementById("paid").value="";
document.getElementById("change").innerText=0;

}

// ================= ADMIN =================
function addProduct(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addProduct",
name:pname.value,
purchase:ppurchase.value,
sale:psale.value,
stock:pstock.value,
branch:pbranch.value,
minStock:pmin.value
})
});

alert("Product Added ✅");

}

function clearForm(){
pname.value="";
ppurchase.value="";
psale.value="";
pstock.value="";
pbranch.value="";
pmin.value="";
}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.reload();
}

// ================= SESSION =================
window.onload=function(){
let u=localStorage.getItem("user");
if(u){
currentUser=JSON.parse(u);
loginSuccess();
}
}

</script>

</body>
</html>
