<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; background: #f0f2f5; text-align: center; }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      width: 95%;
      border-radius: 5px;
      cursor: pointer;
    }

    img {
      width: 80px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginDiv">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- CASHIER -->
<div class="card" id="cashierDiv" style="display:none;">
  <img id="photo"><br>
  <h3 id="name"></h3>

  <select id="products"></select>
  <input id="qty" type="number" placeholder="Quantity">

  <button onclick="sell()">Sell</button>
</div>

<!-- ADMIN -->
<div class="card" id="adminDiv" style="display:none;">
  <h3>Admin Panel</h3>

  <input id="pname" placeholder="Product Name">
  <input id="ppurchase" placeholder="Purchase Price">
  <input id="psale" placeholder="Sale Price">
  <input id="pstock" placeholder="Stock">

  <button onclick="addProduct()">Add Product</button>
</div>

<script>

let currentUser = {};

function login() {
  google.script.run.withSuccessHandler(function(res){
    if(res.status=="success"){
      currentUser = res;

      document.getElementById("loginDiv").style.display="none";

      document.getElementById("name").innerText = res.name;
      document.getElementById("photo").src = res.photo;

      if(res.role == "admin"){
        document.getElementById("adminDiv").style.display="block";
      } else {
        document.getElementById("cashierDiv").style.display="block";
        loadProducts();
      }

    } else {
      alert("Wrong login ❌");
    }
  }).login(
    document.getElementById("user").value,
    document.getElementById("pass").value
  );
}

function loadProducts(){
  google.script.run.withSuccessHandler(function(data){
    let select = document.getElementById("products");
    select.innerHTML = "";

    data.forEach(p=>{
      let opt = document.createElement("option");
      opt.value = p.id;
      opt.text = p.name + " - " + p.price;
      select.appendChild(opt);
    });
  }).getProducts(currentUser.branch);
}

function sell(){
  let selected = document.getElementById("products");

  let price = selected.options[selected.selectedIndex].text.split("-")[1];

  let obj = {
    username: currentUser.name,
    branch: currentUser.branch,
    productID: selected.value,
    qty: document.getElementById("qty").value,
    price: price
  };

  google.script.run.addSale(obj);
  alert("Sale Done ✅");
}

function addProduct(){
  let obj = {
    name: document.getElementById("pname").value,
    purchase: document.getElementById("ppurchase").value,
    sale: document.getElementById("psale").value,
    stock: document.getElementById("pstock").value,
    branch: currentUser.branch,
    username: currentUser.name
  };

  google.script.run.addProduct(obj);
  alert("Product Added ✅");
}

</script>

</body>
</html>
