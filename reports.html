<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>University Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  margin:0;
}

/* LOGIN */
.login-box{
  width:350px;
  margin:120px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.login-box input{
  width:90%;
  padding:10px;
  margin:8px;
}

button{
  padding:10px;
  margin:5px;
  background:#1f3c88;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#162c66}

/* HEADER */
.header{
  background:#1f3c88;
  color:#fff;
  padding:15px 25px;
  display:none;
  align-items:center;
  justify-content:space-between;
}

.header img{height:45px}

/* MAIN */
.container{
  padding:20px;
  display:none;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.filters input{
  padding:8px;
  margin:5px;
}

.actions button{
  margin:5px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th{
  background:#1f3c88;
  color:#fff;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginDiv">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header" id="header">
  <img src="photos/logo.png">
  <h2>University Cafeteria Reports</h2>
</div>

<!-- MAIN -->
<div class="container" id="main">

  <!-- FILTERS -->
  <div class="card filters">
    From: <input type="date" id="from">
    To: <input type="date" id="to">
  </div>

  <!-- ACTIONS -->
  <div class="card actions">
    <button onclick="sales()">📊 Sales</button>
    <button onclick="topProducts()">🔥 Top Products</button>
    <button onclick="cashiers()">👨‍💼 Cashiers</button>
    <button onclick="stock()">📦 Stock</button>
    <button onclick="lowStock()">⚠️ Low Stock</button>
    <button onclick="peak()">⏰ Peak Hours</button>
  </div>

  <!-- CHART -->
  <div class="card">
    <canvas id="chart" height="100"></canvas>
  </div>

  <!-- TABLE -->
  <div class="card">
    <button onclick="exportExcel()">📥 Export Excel</button>
    <table id="table"></table>
  </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

let currentData=[];
let chart;

// ================= LOGIN =================
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success" && res.role=="admin"){

loginDiv.style.display="none";
header.style.display="flex";
main.style.display="block";

}else{
alert("Admin Only ❌");
}

});

}

// ================= HELPERS =================
function getDates(){
return {
from:from.value,
to:to.value
};
}

// ================= SALES =================
function sales(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getSalesReport",...getDates()})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Date","User","Branch","Product","Qty","Sales","Profit"],data);

drawChart(data.map(r=>r[0]),data.map(r=>r[5]));

});

}

// ================= TOP PRODUCTS =================
function topProducts(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getTopProducts",...getDates()})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Product","Qty"],data);

drawChart(data.map(r=>r[0]),data.map(r=>r[1]));

});

}

// ================= CASHIERS =================
function cashiers(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getCashierReport",...getDates()})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Cashier","Sales"],data);

drawChart(data.map(r=>r[0]),data.map(r=>r[1]));

});

}

// ================= STOCK =================
function stock(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getStockReport"})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Product","Stock","Min","Branch"],data);

if(chart) chart.destroy();

});

}

// ================= LOW STOCK =================
function lowStock(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getLowStock"})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Product","Stock","Branch"],data);

if(chart) chart.destroy();

});

}

// ================= PEAK HOURS =================
function peak(){

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getPeakHours",...getDates()})
})
.then(r=>r.json())
.then(data=>{

currentData=data;

renderTable(["Hour","Sales"],data);

drawChart(data.map(r=>r[0]),data.map(r=>r[1]));

});

}

// ================= TABLE =================
function renderTable(headers,data){

let html="<tr>"+headers.map(h=>"<th>"+h+"</th>").join("")+"</tr>";

data.forEach(r=>{
html+="<tr>"+r.map(c=>"<td>"+c+"</td>").join("")+"</tr>";
});

table.innerHTML=html;

}

// ================= CHART =================
function drawChart(labels,data){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Report",
data:data
}]
}
});

}

// ================= EXPORT EXCEL =================
function exportExcel(){

let csv="\uFEFF";

currentData.forEach(r=>{
csv+=r.join(",")+"\n";
});

let blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="report.csv";
link.click();

}

</script>

</body>
</html>
