<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>University Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
}

/* LOGIN */
.login{
width:360px;
margin:120px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.login img{height:70px;margin-bottom:10px}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 15px;
background:#1f3c88;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* HEADER */
.header{
display:none;
background:#1f3c88;
color:#fff;
padding:10px;
text-align:center;
}

/* MAIN */
.main{
display:none;
padding:15px;
}

.card{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#1f3c88;
color:#fff;
}

h3{margin:0 0 10px 0}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginDiv">
<img src="https://amrattiaewais69-gif.github.io/Cafeteria-System/photos/logo.png">
<h2>Admin Login</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header" id="header">
UEC University Reporting System
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="card grid">

<button onclick="summary()">Summary</button>
<button onclick="sales()">Sales</button>
<button onclick="daily()">Daily</button>
<button onclick="branch()">Branch</button>
<button onclick="best()">Best Branch</button>
<button onclick="cashier()">Cashier</button>
<button onclick="top()">Top Products</button>
<button onclick="peak()">Peak</button>
<button onclick="low()">Low Stock</button>
<button onclick="inv()">Inventory</button>

</div>

<div class="card">
<h3 id="title">Report</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

let chart;

// LOGIN
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:u.value,
password:p.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.role=="admin"){
loginDiv.style.display="none";
header.style.display="block";
main.style.display="block";
}else alert("Admin only");
});
}

// TABLE
function render(h,d){

let html="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

d.forEach(r=>{
html+="<tr>"+r.map(x=>"<td>"+x+"</td>").join("")+"</tr>";
});

table.innerHTML=html;
}

// CHART
function draw(d){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:d.map(x=>x[0]),
datasets:[{data:d.map(x=>x[1])}]
}
});
}

// FETCH
function call(a){
return fetch(API,{
method:"POST",
body:JSON.stringify({action:a})
}).then(r=>r.json());
}

// REPORTS
function summary(){
title.innerText="Summary";
call("getSummaryReport").then(d=>{
render(["Total Sales"],[[d.totalSales]]);
});
}

function sales(){
title.innerText="Sales";
call("getSalesReport").then(d=>{
render(["Date","User","Branch","Product","Qty","Sales","Profit"],d);
});
}

function daily(){
title.innerText="Daily";
call("getDailySales").then(d=>{
render(["Date","Sales"],d);
draw(d);
});
}

function branch(){
title.innerText="Branch";
call("getBranchReport").then(d=>{
render(["Branch","Sales"],d);
draw(d);
});
}

function best(){
title.innerText="Best Branch";
call("getBestBranch").then(d=>{
render(["Branch","Sales"],d);
draw(d);
});
}

function cashier(){
title.innerText="Cashier";
call("getCashierReport").then(d=>{
render(["User","Sales"],d);
draw(d);
});
}

function top(){
title.innerText="Top Products";
call("getTopProducts").then(d=>{
render(["Product","Qty"],d);
draw(d);
});
}

function peak(){
title.innerText="Peak Hours";
call("getPeakHours").then(d=>{
render(["Hour","Sales"],d);
draw(d);
});
}

function low(){
title.innerText="Low Stock";
call("getLowStock").then(d=>{
render(["Product","Qty","Min","Branch"],d);
});
}

function inv(){
title.innerText="Inventory";
call("getInventoryByBranch").then(d=>{

let html="";

for(let b in d){
html+="<tr><th colspan='2'>"+b+"</th></tr>";
d[b].forEach(x=>{
html+="<tr><td>"+x[0]+"</td><td>"+x[1]+"</td></tr>";
});
}

table.innerHTML=html;
});
}

</script>

</body>
</html>
