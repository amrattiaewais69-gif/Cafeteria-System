<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* LOGIN */
.login{
width:320px;
margin:120px auto;
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{width:90%;padding:10px;margin:8px}

button{
padding:10px;
background:#1f3c88;
color:#fff;
border:none;
cursor:pointer;
margin:5px;
border-radius:6px;
}

/* HEADER */
.header{
display:none;
background:#1f3c88;
color:#fff;
padding:10px;
text-align:center;
}

/* MAIN */
.main{
display:none;
padding:15px;
}

.card{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{background:#1f3c88;color:#fff}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

</style>
</head>

<body>

<div class="login" id="loginDiv">
<img src="https://amrattiaewais69-gif.github.io/Cafeteria-System/photos/logo.png" height="60">
<h3>Admin Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="header" id="header">
<h3>University Reports</h3>
</div>

<div class="main" id="main">

<div class="card grid">

<button onclick="summary()">Summary</button>
<button onclick="sales()">Sales</button>
<button onclick="daily()">Daily</button>
<button onclick="branch()">Branch</button>
<button onclick="best()">Best Branch</button>
<button onclick="cashier()">Cashier</button>
<button onclick="top()">Top Products</button>
<button onclick="peak()">Peak</button>
<button onclick="low()">Low Stock</button>
<button onclick="inv()">Inventory</button>

</div>

<div class="card">
<h3 id="title">Report</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="table"></table>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";
let chart;
let dataStore=[];

function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:u.value,
password:p.value
})
})
.then(r=>r.json())
.then(d=>{
if(d.role=="admin"){
loginDiv.style.display="none";
header.style.display="block";
main.style.display="block";
}
});
}

function call(action,title){

document.getElementById("title").innerText=title;

return fetch(API,{
method:"POST",
body:JSON.stringify({action})
}).then(r=>r.json());
}

function render(h,d){

let html="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";

d.forEach(r=>{
html+="<tr>"+r.map(x=>"<td>"+x+"</td>").join("")+"</tr>";
});

table.innerHTML=html;
}

function draw(d){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:d.map(x=>x[0]),
datasets:[{data:d.map(x=>x[1])}]
}
});
}

/* REPORTS */

function summary(){
call("getSummaryReport","Summary").then(d=>{
render(["Total"],[[d.totalSales]]);
});
}

function sales(){
call("getSalesReport","Sales").then(d=>{
dataStore=d;
render(["Date","User","Branch","Product","Qty","Sale","Profit"],d);
});
}

function daily(){
call("getDailySales","Daily").then(d=>{
dataStore=d;
render(["Date","Sales"],d);
draw(d);
});
}

function branch(){
call("getBranchReport","Branch").then(d=>{
dataStore=d;
render(["Branch","Sales"],d);
draw(d);
});
}

function best(){
call("getBestBranch","Best Branch").then(d=>{
render(["Branch","Sales"],d);
draw(d);
});
}

function cashier(){
call("getCashierReport","Cashier").then(d=>{
render(["User","Sales"],d);
draw(d);
});
}

function top(){
call("getTopProducts","Top Products").then(d=>{
render(["Product","Qty"],d);
draw(d);
});
}

function peak(){
call("getPeakHours","Peak Hours").then(d=>{
render(["Hour","Sales"],d);
draw(d);
});
}

function low(){
call("getLowStock","Low Stock").then(d=>{
render(["Product","Qty","Min","Branch"],d);
});
}

function inv(){
call("getInventoryByBranch","Inventory").then(d=>{

let html="";

for(let b in d){
html+="<tr><th colspan='2'>"+b+"</th></tr>";

d[b].forEach(x=>{
html+="<tr><td>"+x[0]+"</td><td>"+x[1]+"</td></tr>";
});
}

table.innerHTML=html;
});
}

</script>

</body>
</html>
