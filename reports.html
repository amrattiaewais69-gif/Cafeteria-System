<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports</title>

<style>
body{font-family:Arial;background:#f2f2f2;text-align:center}

.card{
background:#fff;
width:500px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

button{
width:90%;
padding:10px;
margin:5px;
background:#2f528f;
color:#fff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Reports Dashboard</h2>

<script>

// 🔥 حماية الصفحة
let user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role!="admin"){
alert("Unauthorized ❌");
window.location.href="index.html";
}

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

function download(data,name){
let blob=new Blob([data],{type:"text/csv"});
let url=URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download=name;
a.click();
}

// REPORTS

function cashier(){
let u=prompt("Cashier username");

fetch(API,{method:"POST",body:JSON.stringify({action:"report_cashier",username:u})})
.then(r=>r.text())
.then(d=>download(d,"cashier.csv"));
}

function branch(){
let b=prompt("Branch");

fetch(API,{method:"POST",body:JSON.stringify({action:"report_branch",branch:b})})
.then(r=>r.text())
.then(d=>download(d,"branch.csv"));
}

function top(){

fetch(API,{method:"POST",body:JSON.stringify({action:"report_top"})})
.then(r=>r.text())
.then(d=>download(d,"top.csv"));

}

function day(){
let d=prompt("Date YYYY-MM-DD");

fetch(API,{method:"POST",body:JSON.stringify({action:"report_day",date:d})})
.then(r=>r.text())
.then(d=>download(d,"day.csv"));

}

function period(){
let f=prompt("From");
let t=prompt("To");

fetch(API,{method:"POST",body:JSON.stringify({action:"report_period",from:f,to:t})})
.then(r=>r.text())
.then(d=>download(d,"period.csv"));

}

function inventory(){

fetch(API,{method:"POST",body:JSON.stringify({action:"report_inventory"})})
.then(r=>r.text())
.then(d=>download(d,"inventory.csv"));

}

</script>

<div class="card">
<button onclick="cashier()">Sales by Cashier</button>
<button onclick="branch()">Sales by Branch</button>
<button onclick="top()">Top Products</button>
<button onclick="day()">Daily Report</button>
<button onclick="period()">Period Report</button>
<button onclick="inventory()">Inventory</button>
</div>

</body>
</html>
