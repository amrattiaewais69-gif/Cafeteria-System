<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports Dashboard</title>

<style>
body{font-family:Arial;background:#1f3b73;color:white;text-align:center}

.card{
  background:white;
  color:black;
  width:450px;
  margin:20px auto;
  padding:20px;
  border-radius:10px;
}

input,button{
  width:90%;
  padding:10px;
  margin:6px;
}

button{
  background:#2f528f;
  color:white;
  border:none;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ddd;
  padding:6px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Admin Reports Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASH -->
<div class="card" id="dash" style="display:none">

<h3>Reports Dashboard</h3>

<input type="date" id="from">
<input type="date" id="to">

<button onclick="loadReport()">Sales + Profit</button>
<button onclick="exportExcel()">Export Excel</button>

<div id="out"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

// ================= LOGIN =================
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"reportLogin",
username:u.value,
password:p.value
})
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success"){
loginBox.style.display="none";
dash.style.display="block";
}else if(res.status=="denied"){
alert("Admin only ❌");
}else{
alert("Invalid login");
}

});

}

// ================= REPORT =================
function loadReport(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getAdvancedSalesReport",
from:from.value,
to:to.value
})
})
.then(r=>r.json())
.then(data=>{

let html=`<h3>Total Sales: ${data.totalSales}</h3>
<h3>Profit: ${data.profit}</h3>

<table>
<tr><th>Date</th><th>Cashier</th><th>Product</th><th>Qty</th><th>Total</th></tr>`;

data.sales.forEach(r=>{
html+=`<tr>
<td>${r.date}</td>
<td>${r.cashier}</td>
<td>${r.product}</td>
<td>${r.qty}</td>
<td>${r.total}</td>
</tr>`;
});

html+="</table>";

// top cashier
html+="<h3>Top Cashiers</h3>";

for(let c in data.topCashier){
html+=`<div>${c} : ${data.topCashier[c]}</div>`;
}

out.innerHTML=html;

});

}

// ================= EXPORT =================
function exportExcel(){
window.open(API+"?action=exportSalesExcel","_blank");
}

</script>

</body>
</html>
