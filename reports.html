<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef1f5;margin:0}

.header{
background:#1f3c88;
color:#fff;
padding:15px;
display:none;
text-align:center;
}

.container{padding:20px;display:none}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{padding:10px;margin:5px;background:#1f3c88;color:#fff;border:none}

h3{margin-top:0}

table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px;text-align:center}

.login{
width:300px;margin:120px auto;background:#fff;padding:20px;text-align:center
}
</style>
</head>

<body>

<div class="login" id="loginDiv">
<h3>Admin Login</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password"><br>
<button onclick="login()">Login</button>
</div>

<div class="header" id="header">
<img src="https://github.com/amrattiaewais69-gif/Cafeteria-System/blob/main/photos/logo.png" height="40"><br>
UEC University Reports
</div>

<div class="container" id="main">

<div class="card">
From <input type="date" id="from">
To <input type="date" id="to">
</div>

<div class="card">
<button onclick="summary()">💰 Summary</button>
<button onclick="sales()">📊 Sales</button>
<button onclick="daily()">📅 Daily</button>
<button onclick="branches()">🏬 Branches</button>
<button onclick="bestBranch()">🏆 Best Branch</button>
</div>

<div class="card">
<h3 id="reportTitle">Report</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="table"></table>
<button onclick="exportExcel()">Export Excel</button>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";
let currentData=[];
let chart;

// LOGIN
function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"login",username:user.value,password:pass.value})
})
.then(r=>r.json())
.then(res=>{
if(res.role=="admin"){
loginDiv.style.display="none";
header.style.display="block";
main.style.display="block";
}else alert("Admin only");
});
}

// SUMMARY
function summary(){
reportTitle.innerText="Summary Report";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getSummaryReport",from:from.value,to:to.value})
})
.then(r=>r.json())
.then(d=>{
currentData=[[d.totalSales,d.totalProfit,d.profitPercent]];
renderTable(["Sales","Profit","%"],currentData);
});
}

// SALES
function sales(){
reportTitle.innerText="Sales Report";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getSalesReport",from:from.value,to:to.value})
})
.then(r=>r.json())
.then(d=>{
currentData=d;
renderTable(["Date","User","Branch","Product","Qty","Sales","Profit"],d);
});
}

// DAILY
function daily(){
reportTitle.innerText="Daily Sales";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getDailySales",from:from.value,to:to.value})
})
.then(r=>r.json())
.then(d=>{
currentData=d;
renderTable(["Date","Sales"],d);
drawChart(d.map(x=>x[0]),d.map(x=>x[1]));
});
}

// BRANCHES
function branches(){
reportTitle.innerText="Branch Sales";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getBranchReport",from:from.value,to:to.value})
})
.then(r=>r.json())
.then(d=>{
currentData=d;
renderTable(["Branch","Sales"],d);
drawChart(d.map(x=>x[0]),d.map(x=>x[1]));
});
}

// BEST BRANCH
function bestBranch(){
reportTitle.innerText="Best Branch";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"getBestBranch",from:from.value,to:to.value})
})
.then(r=>r.json())
.then(d=>{
currentData=d;
renderTable(["Branch","Sales"],d);
drawChart(d.map(x=>x[0]),d.map(x=>x[1]));
});
}

// TABLE
function renderTable(h,d){
let html="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";
d.forEach(r=>html+="<tr>"+r.map(x=>"<td>"+x+"</td>").join("")+"</tr>");
table.innerHTML=html;
}

// CHART
function drawChart(l,d){
if(chart) chart.destroy();
chart=new Chart(chart=document.getElementById("chart"),{
type:"bar",
data:{labels:l,datasets:[{data:d}]}
});
}

// EXPORT
function exportExcel(){
let csv="\uFEFF";
currentData.forEach(r=>csv+=r.join(",")+"\n");
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="report.csv";
a.click();
}

</script>

</body>
</html>
