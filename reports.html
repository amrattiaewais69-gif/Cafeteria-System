<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports</title>

<style>
body{font-family:Arial;direction:rtl;text-align:center}
input,button{margin:5px;padding:8px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ccc;padding:5px}
.card{background:#f5f5f5;margin:10px;padding:10px;border-radius:10px}
</style>

</head>
<body>

<h2>📊 صفحة التقارير</h2>

<div id="loginDiv">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<div id="reportDiv" style="display:none">

<input type="date" id="from">
<input type="date" id="to">

<button onclick="loadReport()">عرض التقرير</button>
<button onclick="exportExcel()">تحميل Excel</button>

<div id="out"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";

// ================= LOGIN =================
function login(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"reportLogin",
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(d=>{

if(d.status=="success"){
loginDiv.style.display="none";
reportDiv.style.display="block";
}else{
alert("Invalid login");
}

});

}

// ================= LOAD REPORT =================
function loadReport(){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"getAdvancedSalesReport",
from:from.value,
to:to.value
})
})
.then(r=>r.json())
.then(data=>{

if(!data.sales.length){
out.innerHTML="لا يوجد بيانات";
return;
}

let html="";

html+=`<div class="card">💰 إجمالي المبيعات: ${data.totalSales}</div>`;
html+=`<div class="card">📈 الربح: ${data.profit}</div>`;
html+=`<div class="card">📊 نسبة الربح: ${data.profitPercent}%</div>`;

html+="<table><tr><th>التاريخ</th><th>الكاشير</th><th>الصنف</th><th>الكمية</th><th>الإجمالي</th></tr>";

data.sales.forEach(r=>{
html+=`<tr>
<td>${new Date(r.date).toLocaleString()}</td>
<td>${r.cashier}</td>
<td>${r.product}</td>
<td>${r.qty}</td>
<td>${r.total}</td>
</tr>`;
});

html+="</table>";

// Top Cashier
html+="<h3>🏆 أفضل كاشير</h3>";
for(let c in data.topCashier){
html+=`<div>${c} : ${data.topCashier[c]}</div>`;
}

// Top Products
html+="<h3>🔥 أكثر المنتجات بيعاً</h3>";
for(let p in data.topProducts){
html+=`<div>${p} : ${data.topProducts[p]}</div>`;
}

// Peak Hours
html+="<h3>⏰ أوقات الذروة</h3>";
for(let h in data.hourly){
html+=`<div>${h}:00 → ${data.hourly[h]}</div>`;
}

out.innerHTML=html;

});

}

// ================= EXPORT =================
function exportExcel(){
window.open(API+"?action=exportSalesExcel");
}

</script>

</body>
</html>
