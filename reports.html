<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>University Reports</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#1f3c88,#39a2db);
}

/* LOGIN */
.login-box{
width:350px;
margin:120px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

.login-box img{height:60px;margin-bottom:10px}
.login-box h2{margin-bottom:20px}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#1f3c88;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#162d66}

/* MAIN */
.header{
background:#fff;
padding:10px;
display:none;
align-items:center;
justify-content:space-between;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.header img{height:40px}

.container{
padding:20px;
display:none;
}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.grid button{
width:100%;
}

h3{margin-top:0}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{background:#1f3c88;color:#fff}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginDiv">
<img src="./photos/logo.png">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- HEADER -->
<div class="header" id="header">
<img src="https://amrattiaewais69-gif.github.io/Cafeteria-System/photos/logo.png">
<h3>University Reporting System</h3>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="card">
From <input type="date" id="from">
To <input type="date" id="to">
</div>

<div class="card grid">

<button onclick="summary()">💰 Summary</button>
<button onclick="sales()">📊 Sales</button>
<button onclick="products()">📦 Products</button>
<button onclick="daily()">📅 Daily</button>
<button onclick="branches()">🏬 Branches</button>
<button onclick="bestBranch()">🏆 Best Branch</button>
<button onclick="cashier()">👤 Best Cashier</button>

</div>

<div class="card">
<h3 id="title">Report</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<table id="table"></table>
<button onclick="exportExcel()">⬇ Export Excel</button>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxfZ-90qz7Ryu0eigoFDFoA0tiPDVUxkSnyX8arMftTdEYE1dy67Dt_WiYU5DMWYpgZ2w/exec";
let currentData=[];
let chart;

/* LOGIN */
function login(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(res=>{
if(res.role=="admin"){
loginDiv.style.display="none";
header.style.display="flex";
main.style.display="block";
}else{
alert("Admin only");
}
});
}

/* SUMMARY */
function summary(){
title.innerText="Summary Report";

fetchAPI("getSummaryReport").then(d=>{
currentData=[[d.totalSales,d.totalProfit,d.profitPercent]];
render(["Sales","Profit","%"],currentData);
});
}

/* SALES */
function sales(){
title.innerText="Sales Report";

fetchAPI("getSalesReport").then(d=>{
currentData=d;
render(["Date","User","Branch","Product","Qty","Sales","Profit"],d);
});
}

/* PRODUCTS */
function products(){
title.innerText="Products Profit";

fetchAPI("getProductsReport").then(d=>{
currentData=d;
render(["Product","Sales","Profit"],d);
draw(d);
});
}

/* DAILY */
function daily(){
title.innerText="Daily Sales";

fetchAPI("getDailySales").then(d=>{
currentData=d;
render(["Date","Sales"],d);
draw(d);
});
}

/* BRANCHES */
function branches(){
title.innerText="Branches Sales";

fetchAPI("getBranchReport").then(d=>{
currentData=d;
render(["Branch","Sales"],d);
draw(d);
});
}

/* BEST BRANCH */
function bestBranch(){
title.innerText="Best Branch";

fetchAPI("getBestBranch").then(d=>{
currentData=d;
render(["Branch","Sales"],d);
draw(d);
});
}

/* CASHIER */
function cashier(){
title.innerText="Best Cashier";

fetchAPI("getCashierReport").then(d=>{
currentData=d;
render(["User","Sales"],d);
draw(d);
});
}

/* FETCH */
function fetchAPI(action){
return fetch(API,{
method:"POST",
body:JSON.stringify({
action:action,
from:from.value,
to:to.value
})
}).then(r=>r.json());
}

/* TABLE */
function render(h,d){
let html="<tr>"+h.map(x=>"<th>"+x+"</th>").join("")+"</tr>";
d.forEach(r=>{
html+="<tr>"+r.map(x=>"<td>"+x+"</td>").join("")+"</tr>";
});
table.innerHTML=html;
}

/* CHART */
function draw(d){
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:d.map(x=>x[0]),
datasets:[{data:d.map(x=>x[1])}]
}
});
}

/* EXPORT */
function exportExcel(){
let csv="\uFEFF";
currentData.forEach(r=>csv+=r.join(",")+"\n");

let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="report.csv";
a.click();
}

</script>

</body>
</html>
